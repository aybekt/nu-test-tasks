upstream wordpress_backend {
    server wordpress:80;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # Статическая HTML-версия (fallback): если файл есть в /var/www/static — отдаём его.
    root /var/www/static;
    index index.html;

    # Админка и служебные пути WordPress всегда на динамический бэкенд
    location ^~ /wp-admin {
        include /etc/nginx/proxy-wp.conf;
        proxy_pass http://wordpress_backend;
    }

    location = /wp-login.php {
        include /etc/nginx/proxy-wp.conf;
        proxy_pass http://wordpress_backend;
    }

    location ^~ /wp-includes {
        include /etc/nginx/proxy-wp.conf;
        proxy_pass http://wordpress_backend;
    }

    location ^~ /wp-content {
        include /etc/nginx/proxy-wp.conf;
        proxy_pass http://wordpress_backend;
    }

    location / {
        try_files $uri $uri/ @wordpress;
    }

    location @wordpress {
        include /etc/nginx/proxy-wp.conf;
        proxy_pass http://wordpress_backend;
    }
}
